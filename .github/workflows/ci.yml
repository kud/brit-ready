name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      # Cheap checks first so typos fail in seconds, before the slower build.
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
